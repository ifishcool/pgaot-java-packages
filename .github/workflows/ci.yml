name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      CI: true
      # ---- code-auth ----
      YUNTOWER_APP_ID: ${{ secrets.YUNTOWER_APP_ID }}
      YUNTOWER_APP_SECRET: ${{ secrets.YUNTOWER_APP_SECRET }}
      CODE_AUTH_JWT_SECRET: ${{ secrets.CODE_AUTH_JWT_SECRET }}
      CODE_AUTH_REDIS_URI: ${{ secrets.CODE_AUTH_REDIS_URI }}
      CODE_AUTH_TOKEN_TTL: '604800'
      CODE_AUTH_KEY_PREFIX: 'pgaot:login:token'
      # ---- code-sql / code-datasheet ----
      CODE_SQL_URL: ${{ secrets.CODE_SQL_URL }}
      CODE_SQL_USER: ${{ secrets.CODE_SQL_USER }}
      CODE_SQL_PASS: ${{ secrets.CODE_SQL_PASS }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    # ═══════════════════════════════════════════
    # code-sql (no internal deps)
    # ═══════════════════════════════════════════

    - name: code-sql — compile
      run: mvn -B compile -f code-sql/pom.xml

    - name: code-sql — unit tests
      run: mvn -B test -f code-sql/pom.xml

    - name: code-sql — ErrorCode dedup
      run: java -cp code-sql/target/classes com.pgaot.sql.common.code.ErrorCode

    - name: code-sql — install to local .m2
      run: mvn -B install -DskipTests -f code-sql/pom.xml

    # ═══════════════════════════════════════════
    # code-auth (depends on code-sql)
    # ═══════════════════════════════════════════

    - name: code-auth — compile
      run: mvn -B compile -f code-auth/pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: code-auth — unit tests
      run: mvn -B test -f code-auth/pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: code-auth — ErrorCode dedup
      run: java -cp code-auth/target/classes com.pgaot.account.auth.common.code.ErrorCode

    - name: code-auth — install to local .m2
      run: mvn -B install -DskipTests -f code-auth/pom.xml

    # ═══════════════════════════════════════════
    # code-datasheet (depends on code-sql)
    # ═══════════════════════════════════════════

    - name: code-datasheet — compile
      run: mvn -B compile -f code-datasheet/pom.xml

    - name: code-datasheet — test-compile
      run: mvn -B test-compile -f code-datasheet/pom.xml

    - name: code-datasheet — ErrorCode dedup
      run: java -cp code-datasheet/target/classes com.pgaot.datasheet.common.code.ErrorCode
