name: CI / Publish

on:
  push:
    tags: ['code-sql/v*', 'code-auth/v*', 'code-datasheet/v*', 'code-log/v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CI: true
      YUNTOWER_APP_ID: ${{ secrets.YUNTOWER_APP_ID }}
      YUNTOWER_APP_SECRET: ${{ secrets.YUNTOWER_APP_SECRET }}
      CODE_AUTH_JWT_SECRET: ${{ secrets.CODE_AUTH_JWT_SECRET }}
      CODE_AUTH_REDIS_URI: ${{ secrets.CODE_AUTH_REDIS_URI }}
      CODE_SQL_URL: ${{ secrets.CODE_SQL_URL }}
      CODE_SQL_USER: ${{ secrets.CODE_SQL_USER }}
      CODE_SQL_PASS: ${{ secrets.CODE_SQL_PASS }}

    steps:
    - uses: actions/checkout@v4

    - name: Parse module and version from tag
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        MODULE=${TAG%%/*}
        VERSION=${TAG#*/v}
        echo "MODULE=$MODULE" >> $GITHUB_ENV
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Testing $MODULE v$VERSION"

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    # ═══ install dependency ═══
    - name: Install code-sql (dependency)
      if: env.MODULE == 'code-auth' || env.MODULE == 'code-datasheet' || env.MODULE == 'code-log'
      run: mvn -B install -DskipTests -f code-sql/pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    # ═══ build & test ═══
    - name: Compile
      run: mvn -B compile -f $MODULE/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    - name: Unit & Integration Tests
      run: mvn -B test -f $MODULE/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    - name: ErrorCode dedup
      run: |
        case "$MODULE" in
          code-sql)       PKG=sql ;;
          code-auth)      PKG=account.auth ;;
          code-datasheet) PKG=datasheet ;;
          code-log)       PKG=log ;;
        esac
        java -cp $MODULE/target/classes com.pgaot.${PKG}.common.code.ErrorCode

    # ═══ set version and publish ═══
    - name: Set release version
      run: mvn -B versions:set -DnewVersion=$VERSION -f $MODULE/pom.xml

    - name: Publish to GitHub Packages
      run: mvn deploy -f $MODULE/pom.xml -s $GITHUB_WORKSPACE/settings.xml -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
